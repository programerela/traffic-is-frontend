<div class="page-container">
  <div class="page-header">
    <div>
      <h1>Vozila</h1>
      <p class="page-subtitle">Pregled svih registrovanih vozila</p>
    </div>
    <button mat-raised-button color="primary" routerLink="new">
      <mat-icon>add</mat-icon>
      Novo Vozilo
    </button>
  </div>

  <mat-card class="filter-card">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Pretraži vozila</mat-label>
      <input matInput (keyup)="applyFilter($event)" placeholder="Registracija, marka, model..." />
      <mat-icon matPrefix>search</mat-icon>
    </mat-form-field>
  </mat-card>

  <div *ngIf="loading()" class="loading-container">
    <mat-spinner></mat-spinner>
  </div>

  <mat-card *ngIf="!loading()" class="table-card">
    <table mat-table [dataSource]="filteredVozila()" class="data-table">
      <ng-container matColumnDef="idVozila">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let vozilo">#{{ vozilo.idVozila }}</td>
      </ng-container>

      <ng-container matColumnDef="vozilo">
        <th mat-header-cell *matHeaderCellDef>Vozilo</th>
        <td mat-cell *matCellDef="let vozilo">
          <div class="vehicle-cell">
            <mat-icon>directions_car</mat-icon>
            <strong>{{ vozilo.marka }} {{ vozilo.model }}</strong>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="registracija">
        <th mat-header-cell *matHeaderCellDef>Registracija</th>
        <td mat-cell *matCellDef="let vozilo">
          <mat-chip color="accent">{{ vozilo.registracija }}</mat-chip>
        </td>
      </ng-container>

      <ng-container matColumnDef="godiste">
        <th mat-header-cell *matHeaderCellDef>Godište</th>
        <td mat-cell *matCellDef="let vozilo">{{ vozilo.godiste }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Akcije</th>
        <td mat-cell *matCellDef="let vozilo">
          <div class="action-buttons">
            <button
              mat-icon-button
              [routerLink]="[vozilo.idVozila]"
              matTooltip="Detalji"
              color="accent"
            >
              <mat-icon>visibility</mat-icon>
            </button>
            <button
              mat-icon-button
              [routerLink]="[vozilo.idVozila, 'edit']"
              matTooltip="Izmeni"
              color="primary"
            >
              <mat-icon>edit</mat-icon>
            </button>
            <button
              mat-icon-button
              (click)="deleteVozilo(vozilo.idVozila)"
              matTooltip="Obriši"
              color="warn"
            >
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </mat-card>
</div>
