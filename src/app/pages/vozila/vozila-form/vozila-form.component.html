<div class="page-container">
  <div class="page-header">
    <h1>{{ isEditMode ? 'Izmeni Vozilo' : 'Novo Vozilo' }}</h1>
    <p class="page-subtitle">
      {{ isEditMode ? 'Ažuriranje podataka o vozilu' : 'Unos novog vozila' }}
    </p>
  </div>

  <mat-card class="form-card">
    <form [formGroup]="voziloForm" (ngSubmit)="onSubmit()">

      <div class="form-section">
        <h3>Podaci o Vozilu</h3>

        <div class="form-row">
          <mat-form-field appearance="outline">
            <mat-label>Marka</mat-label>
            <input matInput formControlName="marka">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Model</mat-label>
            <input matInput formControlName="model">
          </mat-form-field>
        </div>

        <div class="form-row">
          <mat-form-field appearance="outline">
            <mat-label>Registracija</mat-label>
            <input matInput formControlName="registracija">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Godište</mat-label>
            <input matInput type="number" formControlName="godiste">
          </mat-form-field>
        </div>
      </div>

      <div class="form-actions">
        <button mat-button type="button" (click)="cancel()">Otkaži</button>
        <button mat-raised-button color="primary" type="submit" [disabled]="loading">
          {{ isEditMode ? 'Sačuvaj' : 'Kreiraj' }}
        </button>
      </div>

    </form>
  </mat-card>
</div>
