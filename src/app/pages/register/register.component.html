<div class="register-container">
  <div class="register-content">
    <div class="register-header">
      <img src="assets/logo.png" alt="police-logo" class="logo" />
      <h1>Registracija</h1>
      <p>Kreirajte novi nalog</p>
    </div>

    <mat-card class="register-card">
      <mat-card-content>
        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Ime</mat-label>
            <input matInput formControlName="ime" />
            <mat-error *ngIf="registerForm.get('ime')?.hasError('required')">
              Ime je obavezno
            </mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Prezime</mat-label>
            <input matInput formControlName="prezime" />
            <mat-error *ngIf="registerForm.get('prezime')?.hasError('required')">
              Prezime je obavezno
            </mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Korisničko ime</mat-label>
            <input matInput formControlName="username" />
            <mat-error *ngIf="registerForm.get('username')?.hasError('required')">
              Korisničko ime je obavezno
            </mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Lozinka</mat-label>
            <input matInput type="password" formControlName="password" />
            <mat-error *ngIf="registerForm.get('password')?.hasError('minlength')">
              Lozinka mora imati najmanje 6 karaktera
            </mat-error>
          </mat-form-field>

          <button
            mat-raised-button
            color="primary"
            type="submit"
            class="full-width"
            [disabled]="registerForm.invalid"
          >
            Registruj se
          </button>

          <div class="login-link">
            <span>Već imate nalog?</span>
            <a routerLink="/login" mat-button color="primary">Prijavite se</a>
          </div>
        </form>
      </mat-card-content>
    </mat-card>
  </div>
</div>
