<div class="page-container">
  <div class="page-header">
    <h1>{{ isEditMode ? 'Izmeni Vozača' : 'Novi Vozač' }}</h1>
    <p class="page-subtitle">
      {{ isEditMode ? 'Ažuriranje podataka o vozaču' : 'Unos novog vozača' }}
    </p>
  </div>

  <mat-card class="form-card">
    <form [formGroup]="vozacForm" (ngSubmit)="onSubmit()">
      <div class="form-section">
        <h3>Podaci o vozaču</h3>

        <div class="form-row">
          <mat-form-field appearance="outline">
            <mat-label>Ime</mat-label>
            <input matInput formControlName="ime" />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Prezime</mat-label>
            <input matInput formControlName="prezime" />
          </mat-form-field>
        </div>

        <div class="form-row">
          <mat-form-field appearance="outline">
            <mat-label>JMBG</mat-label>
            <input matInput formControlName="jmbg" />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Broj vozačke</mat-label>
            <input matInput formControlName="brojVozacke" />
          </mat-form-field>
        </div>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Adresa</mat-label>
          <input matInput formControlName="adresa" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Telefon</mat-label>
          <input matInput formControlName="telefon" />
        </mat-form-field>
      </div>
      <div class="form-section">
        <h3>Podaci o vozilu</h3>
        <div class="form-row">
          <mat-form-field appearance="outline">
            <mat-label>Ime</mat-label>
            <input matInput formControlName="ime" />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Prezime</mat-label>
            <input matInput formControlName="prezime" />
          </mat-form-field>
        </div>
      </div>

      <div class="form-actions">
        <button mat-button type="button" (click)="cancel()">Otkaži</button>
        <button mat-raised-button color="primary" type="submit" [disabled]="loading">
          {{ isEditMode ? 'Sačuvaj' : 'Kreiraj' }}
        </button>
      </div>
    </form>
  </mat-card>
</div>
